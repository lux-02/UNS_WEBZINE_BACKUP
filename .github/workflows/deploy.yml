name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # 최신 v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}         # EC2 Public IPv4 DNS 또는 IP
          username: ${{ secrets.EC2_USERNAME }} # 기본: ec2-user (Amazon Linux) / ubuntu (Ubuntu)
          key: ${{ secrets.EC2_SSH_KEY }}       # ~/.ssh/id_rsa 내용 전체
          port: 22
          script: |
            # 프로젝트 폴더로 이동
            cd ~/UNS_WEBZINE_BACKUP

            # 최신 코드 받아 c기
            git pull origin main

            # ── Strapi 배포 ──
            cd strapi-cms
            npm ci                          # 빌드에 devDependencies 필요
            NODE_ENV=production npm run build
            pm2 restart strapi || pm2 start npm --name "strapi" -- start

            # ── Next.js 배포 ──
            cd ..
            npm ci
            npm run build
            pm2 restart nextjs || pm2 start npm --name "nextjs" -- start

            echo "🚀 배포 완료!"
